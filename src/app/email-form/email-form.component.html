<div class="container">
  <h2 class="text-center mb-5">
    Contact Me
  </h2>
  <div class="row">
    <div class="col-md-6 offset-md-3">
      <form [formGroup]="FormData" (ngSubmit)="onSubmit(FormData.value)">
        <div class="form-group">
          <label for="Email">Email</label>
          <input type="email" class="form-control" name="Email" aria-describedby="emailHelp" placeholder="Enter email" formControlName="Email">
          <small id="emailHelp" class="form-text text-muted">I will never share your email with anyone.</small>
        </div>
        <div class="form-group">
          <label for="FullName">Full Name</label>
          <input type="text" class="form-control" name="FullName" placeholder="Full Name" formControlName="FullName">
        </div>
        <div class="form-group">
          <label for="comment">Comment</label>
          <textarea class="form-control" formControlName="Comment" name="Comment">
          </textarea>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="!FormData.valid">
          Submit
        </button>
      </form>
    </div>
  </div>
</div>
